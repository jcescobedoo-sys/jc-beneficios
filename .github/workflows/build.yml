name: Build & deploy dashboard

   on:
     push:
       paths:
         - 'data/**'
         - 'enrich.json'
         - 'web.json'
         - 'build.js'
     workflow_dispatch:

   permissions:
     contents: write
     pages: write
     id-token: write

   concurrency:
     group: pages
     cancel-in-progress: true

   jobs:
     build-deploy:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v4

         - uses: actions/setup-node@v4
           with:
             node-version: '20'

         - name: Regenerate & validate index.html
           run: node build.js

         - name: Commit regenerated index.html
           run: |
             git config user.name  "github-actions[bot]"
             git config user.email "github-actions[bot]@users.noreply.github.com"
             git add index.html
             git diff --cached --quiet || git commit -m "build: regenerate dashboard [skip ci]"
             git push

         - uses: actions/configure-pages@v5
         - uses: actions/upload-pages-artifact@v3
           with:
             path: '.'
         - id: deployment
           uses: actions/deploy-pages@v4
