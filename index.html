function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s*-\s*justo$/,"").replace(/\s*\(.*\)$/,"").trim();}
function kfmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+"k":""+n;}
const WEB={};
function siteUrl(it){
  const w=WEB[norm(it.n)];
  if(w) return w;
  const base=it.n.replace(/\s*-\s*justo$/i,'').replace(/\s*\(.*\)$/,'');
  const place=(it.loc&&!/online|presencial|tienda|metropolitana|regiones|nacional/i.test(it.loc))?it.loc.split('/')[0].trim():'Chile';
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(base+' '+place);
}
function noteFor(it){
  if(it.bank==='san'){
    let s='40% off, cap CLP $40.000/day. Valid Jun\u2013Aug 2026 paying with Santander WorldMember Limited, cr\u00e9dito or LATAM Pass.';
    if(it.mds) s+=' Applies Wednesdays (Mi\u00e9rcoles de Sabores).';
    s+=' Not combinable with other promotions.';
    return s;
  }
  if(it.bank==='sco'){
    const ruta={Local:'Ruta Gourmet',Internacional:'Ruta Internacional',Vinas:'Rutas de Vi\u00f1as',Dulce:'Ruta Dulce',Rapida:'Ruta R\u00e1pida'}[it.sub]||'Scotia Rewards';
    let s='Scotiabank '+ruta+(it.disc?' ('+it.disc+')':'')+' with the Singular Visa Infinite.';
    if(it.sub==='Local') s+=' Usually 50% Thu / 20% other days at participating venues.';
    s+=' Enrollment and a monthly cap may apply \u2014 confirm in the Scotia Rewards app.';
    return s;
  }
  if(it.bank==='bice'){
    let s='Banco Bice '+(it.disc||'')+' with the Visa Infinite.';
    if(/justo/i.test(it.n)) s+=' Order through the Justo app.';
    else if(/rappi|pedidosya/i.test(it.n)) s+=' Order through the delivery app.';
    s+=' A monthly cap may apply \u2014 confirm exact terms in the Bice app.';
    return s;
  }
  return '';
}
SAN.forEach(r=>MERGED.push({n:r[0],days:r[1].split(','),disc:'40%',discN:40,loc:regLbl(r[2]),bank:'san',cat:classify('san',r[0]),mds:r[3].includes('M'),wml:r[3].includes('W')}));
SCO.forEach(r=>MERGED.push({n:r[0],days:[r[1]],disc:r[2]?r[2]+'%':'',discN:discNum(r[2]),loc:r[3],bank:'sco',cat:classify('sco',r[0],r[4]),sub:r[4]}));

let selected=todayKey(), catSel="all", bankSel="all", q="", sortMode="disc";
function todayKey(){try{const wd=new Intl.DateTimeFormat('en-US',{weekday:'short',timeZone:'America/Santiago'}).format(new Date());return {Mon:"lun",Tue:"mar",Wed:"mie",Thu:"jue",Fri:"vie",Sat:"sab",Sun:"dom"}[wd]||"lun";}catch(e){return "lun";}}
function el(id){return document.getElementById(id);}
function match(it){return (bankSel==='all'||it.bank===bankSel)&&(catSel==='all'||it.cat===catSel)&&(!q||it.n.toLowerCase().indexOf(q.toLowerCase())>-1);}
function forDay(dk){return MERGED.filter(it=>(it.days.indexOf(dk)>-1||it.days.indexOf('diario')>-1)&&match(it));}
function daily(){return MERGED.filter(it=>it.days.indexOf('diario')>-1&&match(it));}
function bySort(a,b){
  if(sortMode==='rate'){const ra=(RAT[norm(a.n)]||[0])[0],rb=(RAT[norm(b.n)]||[0])[0];return (rb-ra)||(b.discN-a.discN)||a.n.localeCompare(b.n);}
  return (b.discN-a.discN)||(a.bank<b.bank?-1:1)||a.n.localeCompare(b.n);
}

function card(it){
  const isDaily=it.days.indexOf('diario')>-1;
  const everyTag=(isDaily&&selected!=='diario')?'<span class="tag e">EVERY DAY</span>':'';
  const badges=[everyTag,it.wml?'<span class="tag w">WML</span>':'',it.mds?'<span class="tag m">MdS</span>':''].filter(Boolean).join('');
  const disc=(it.disc&&it.discN>=0)?'<div class="disc">'+it.disc+'</div>':'<div class="disc small">benefit</div>';
  const r=RAT[norm(it.n)];
  const rate=r?'<span class="rate">\u2605 '+r[0]+' <em>('+kfmt(r[1])+')</em></span>':'';
  const price=(r&&r[2])?'<span class="price">'+'$'.repeat(r[2])+'</span>':'';
  const link=siteUrl(it);
  const off=WEB[norm(it.n)];
  const site=link?'<a class="site" href="'+link+'" target="_blank" rel="noopener">'+(off?'Website':'Map')+' \u2197</a>':'';
  const meta=[it.loc?'<span>'+it.loc+'</span>':'',rate,price,site].filter(Boolean).join('<span class="sep">&middot;</span>');
  const note=noteFor(it);
  const notes=note?'<div class="note">'+note+'</div>':'';
  return '<div class="m '+it.bank+'"><div class="minfo"><div class="mn"><span class="dot '+it.bank+'"></span>'+it.n+'</div>'+(meta?'<div class="ml">'+meta+'</div>':'')+(badges?'<div class="fl">'+badges+'</div>':'')+notes+'</div>'+disc+'</div>';
}
function catBlocks(list){
  const cats=(catSel==='all')?CATS:CATS.filter(c=>c.k===catSel);
  let html='';
  for(const c of cats){
    const items=list.filter(it=>it.cat===c.k).sort(bySort);
    if(!items.length){ if(catSel!=='all') html+='<div class="empty">No '+c.l.toLowerCase()+' options for this filter.</div>'; continue; }
    html+='<div class="catlbl">'+c.l+' <span class="n">&middot; '+items.length+'</span></div>';
    html+='<div class="grid">'+items.map(card).join('')+'</div>';
  }
  return html||'<div class="empty">No options for this filter. Try "All" or clear the search.</div>';
}
function renderLegend(){
  el('legend').innerHTML=Object.entries(BANKMETA).map(([k,m])=>'<div class="lg"><span class="dot '+k+'"></span><b>'+m.name+'</b> <span class="cc">'+m.card+'</span></div>').join('');
}
function renderCatSeg(){
  const opts=[["all","All"]].concat(CATS.map(c=>[c.k,c.l]));
  el('catseg').innerHTML=opts.map(([k,l])=>'<button data-k="'+k+'" class="'+(catSel===k?'on':'')+'">'+l+'</button>').join('');
  el('catseg').querySelectorAll('button').forEach(n=>n.onclick=()=>{catSel=n.dataset.k;render();});
}
function renderBankSeg(){
  const opts=[["all","All"],["san","San"],["sco","Sco"],["bice","Bice"]];
  el('bankseg').innerHTML=opts.map(([k,l])=>'<button data-k="'+k+'" class="'+(bankSel===k?'on':'')+'">'+(k!=='all'?'<span class="d dot '+k+'"></span>':'')+l+'</button>').join('');
  el('bankseg').querySelectorAll('button').forEach(n=>n.onclick=()=>{bankSel=n.dataset.k;render();});
}
function renderSortSeg(){
  const opts=[["disc","Sort: Discount"],["rate","Sort: Rating"]];
  el('sortseg').innerHTML=opts.map(([k,l])=>'<button data-k="'+k+'" class="'+(sortMode===k?'on':'')+'">'+l+'</button>').join('');
  el('sortseg').querySelectorAll('button').forEach(n=>n.onclick=()=>{sortMode=n.dataset.k;render();});
}
const SLOTS=[{k:'diario',l:'EVERY DAY',f:'Every day',every:true}].concat(DAYS.map(d=>({k:d.k,l:d.l,f:d.f})));
function listFor(k){return k==='diario'?daily():forDay(k);}
function renderRibbon(){
  const t=todayKey();
  el('ribbon').innerHTML=SLOTS.map(s=>{const n=listFor(s.k).length;return '<div class="day '+(s.every?'everyday ':'')+(s.k===selected?'sel ':'')+(s.k===t?'today':'')+'" data-k="'+s.k+'"><div class="dl">'+s.l+'</div><div class="cnt">'+n+'</div></div>';}).join('');
  el('ribbon').querySelectorAll('.day').forEach(n=>n.onclick=()=>{selected=n.dataset.k;render();});
}
function render(){
  renderLegend();renderCatSeg();renderBankSeg();renderSortSeg();renderRibbon();
  el('stamp').textContent='Updated '+UPDATED;
  const cur=SLOTS.find(s=>s.k===selected)||SLOTS[0],list=listFor(selected);
  el('dayTitle').innerHTML=cur.f+' <span>&middot; '+list.length+' options</span>';
  el('hoyTag').textContent=(selected===todayKey())?'\u00b7 today':'';
  el('dayBody').innerHTML=catBlocks(list);
  el('foot').innerHTML='Live data (July 2026) from each bank\u2019s official feed: Santander promociones.json, Scotiabank scotiarewards.cl, Bice beneficios-bice. Each weekday now also lists always-on \u201CEVERY DAY\u201D benefits (tagged). \u2605 rating / $ price from Google Places (address-verified). The \u201CFind \u2197\u201D link opens the venue\u2019s Google listing \u2014 which carries its official website, menu, hours and directions; direct official-site links are being layered in. Notes show the program-level terms that apply: Santander 40% capped at CLP $40.000/day (Jun\u2013Aug 2026); Scotia per-Ruta terms; Bice Visa Infinite \u2014 confirm exact caps and enrollment in each bank\u2019s app. \u201COther\u201D = delivery apps, grocery and water.';
}
el('q').oninput=e=>{q=e.target.value;render();};
render();
</script>
